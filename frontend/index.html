<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Green Corridor Dashboard</title>
    <!-- Auth guard: redirect to landing if not logged in -->
    <script>
        if (!sessionStorage.getItem('gw_user')) {
            window.location.replace('landing.html');
        }
    </script>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Ambulance pulse animation used by updateAmbulance() */
        @keyframes ambPulse {
            from { box-shadow: 0 0 10px 3px rgba(255,80,0,.6); }
            to   { box-shadow: 0 0 22px 9px rgba(255,80,0,.95); }
        }

        /* Live status bar */
        #status-bar {
            display: none;
            gap: 18px;
            align-items: center;
            background: rgba(0,0,0,.55);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255,255,255,.08);
            padding: 8px 24px;
            font-size: .82rem;
            color: #ddd;
            font-family: 'Inter','Segoe UI',sans-serif;
            flex-wrap: wrap;
        }
        .status-phase { font-weight: 700; font-size: .9rem; }
        .status-item  { color: #bbb; }
        .status-item strong { color: #fff; }

        /* Dispatch button state overrides */
        #dispatch-btn.btn-calculating { background: #555 !important; cursor: wait !important; }
        #dispatch-btn.btn-dispatching { cursor: default !important; }

        /* Incident type select styling */
        .input-group select {
            padding: 10px;
            border: 1px solid rgba(255,255,255,.2);
            border-radius: 8px;
            background: rgba(255,255,255,.05);
            color: white;
            outline: none;
            font-family: inherit;
        }
    </style>
</head>
<body>
    <div id="dashboard-container">
        <header style="display:flex; align-items:center; justify-content:space-between; padding: 12px 20px;">
            <div style="text-align:center; flex:1;">
                <h1 style="font-size:1.5rem; color:var(--accent-color); letter-spacing:1px;">Dynamic Green Corridor Dispatch</h1>
                <p style="font-size:0.8rem; color:#a0a0a0; margin-top:3px;">Agent Console: Incident Logging &amp; Fleet Routing</p>
            </div>
            <a href="landing.html" onclick="sessionStorage.removeItem('gw_user')" title="Sign out"
               style="font-size:0.75rem; color:#666; text-decoration:none; padding:5px 12px;
                      border:1px solid rgba(255,255,255,0.1); border-radius:6px;
                      transition:color 0.2s, border-color 0.2s; white-space:nowrap;"
               onmouseover="this.style.color='#ccc'; this.style.borderColor='rgba(255,255,255,0.3)'"
               onmouseout="this.style.color='#666'; this.style.borderColor='rgba(255,255,255,0.1)'">
                ⬅ Sign out
            </a>
        </header>

        <div id="controls-panel">
            <div class="input-group">
                <label for="incidentType">Type of Incident:</label>
                <select id="incidentType">
                    <option value="cardiac">Cardiac Arrest</option>
                    <option value="accident">Severe Accident</option>
                    <option value="fire">Fire Emergency</option>
                    <option value="maternity">Maternity Emergency</option>
                    <option value="other">Other</option>
                </select>
            </div>
            <div class="input-group">
                <label for="incidentLocation">Location:</label>
                <input type="text" id="incidentLocation" placeholder="Click map to log incident" readonly>
            </div>
            <button id="dispatch-btn" disabled style="opacity:0.4;cursor:not-allowed;">Dispatch Ambulance</button>
        </div>

        <!-- Live status bar — shown during active dispatch simulation -->
        <div id="status-bar"></div>

        <div id="map-container">
            <div id="map"></div>
        </div>
    </div>

    <!-- Google Maps API is now loaded dynamically via app.js -->
    <script src="app.js"></script>
</body>
</html>
